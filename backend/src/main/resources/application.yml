server:
  port: 18180

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:senior_safety;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

app:
  ai-server-url: ${AI_SERVER_URL:http://localhost:18080}
